name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

defaults:
  run:
    # 모노 구조 — 모든 Python 코드는 ai-proposal-generator/ 하위에 있음
    working-directory: ai-proposal-generator

jobs:
  test:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    env:
      # 테스트 코드는 실제 Anthropic API 를 호출하지 않는다.
      # BaseAgent 인스턴스화 검증을 위해 더미 키만 주입.
      ANTHROPIC_API_KEY: test-dummy-key-not-real
      PYTHONIOENCODING: utf-8

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          # cache 옵션은 working-directory 미적용 — 절대 경로로 명시
          cache-dependency-path: ai-proposal-generator/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Show installed package versions
        run: pip list

      - name: Run pytest
        run: pytest -v --tb=short

      - name: Verify zero deprecation warnings
        run: |
          OUTPUT=$(pytest --tb=no -q 2>&1)
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -q "PydanticDeprecated"; then
            echo "::error::Pydantic deprecation warnings detected"
            exit 1
          fi
