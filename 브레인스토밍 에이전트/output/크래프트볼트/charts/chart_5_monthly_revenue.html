<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1600px; height: 900px; overflow: hidden;
    background: #FFFFFF;
    font-family: 'Noto Sans KR', sans-serif;
    display: flex; flex-direction: column;
    padding: 60px 120px 40px;
  }
  .header {
    display: flex; justify-content: space-between; align-items: flex-end;
    margin-bottom: 40px;
  }
  .title { font-size: 38px; font-weight: 700; color: #1A1A1A; }
  .subtitle { font-size: 20px; color: #888; margin-top: 6px; }
  .legend {
    display: flex; gap: 32px; align-items: center;
  }
  .leg-item { display: flex; align-items: center; gap: 10px; }
  .leg-dot { width: 20px; height: 14px; border-radius: 3px; }
  .leg-text { font-size: 18px; font-weight: 600; color: #555; }
  .chart-container { flex: 1; position: relative; }
</style>
</head>
<body>
<div class="header">
  <div>
    <div class="title">월별 매출 목표</div>
    <div class="subtitle">광고 유입 + 자연 유입 누적 매출 (만원)</div>
  </div>
  <div class="legend">
    <div class="leg-item">
      <div class="leg-dot" style="background:#EF7B00;"></div>
      <div class="leg-text">광고 유입 매출</div>
    </div>
    <div class="leg-item">
      <div class="leg-dot" style="background:#3B82F6;"></div>
      <div class="leg-text">자연 유입 매출</div>
    </div>
  </div>
</div>
<div class="chart-container">
  <canvas id="stackedBar"></canvas>
</div>
<script>
const ctx = document.getElementById('stackedBar').getContext('2d');
new Chart(ctx, {
  type: 'bar',
  data: {
    labels: ['4월', '5월', '6월'],
    datasets: [
      {
        label: '광고 유입 매출',
        data: [3500, 5000, 5500],
        backgroundColor: '#EF7B00',
        borderRadius: { topLeft: 0, topRight: 0, bottomLeft: 6, bottomRight: 6 },
        borderSkipped: false,
      },
      {
        label: '자연 유입 매출',
        data: [2500, 5000, 6000],
        backgroundColor: '#3B82F6',
        borderRadius: { topLeft: 6, topRight: 6, bottomLeft: 0, bottomRight: 0 },
        borderSkipped: false,
      }
    ]
  },
  options: {
    animation: false,
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
      legend: { display: false },
      tooltip: { enabled: false },
      datalabels: { display: false }
    },
    scales: {
      x: {
        stacked: true,
        grid: { display: false },
        ticks: {
          font: { family: 'Noto Sans KR', size: 22, weight: '600' },
          color: '#444'
        },
        border: { display: false }
      },
      y: {
        stacked: true,
        min: 0, max: 14000,
        grid: { color: '#F0F0F0' },
        ticks: {
          font: { family: 'Noto Sans KR', size: 16 },
          color: '#888',
          callback: v => v === 0 ? '' : (v/100).toFixed(0) + '백만'
        },
        border: { display: false }
      }
    },
    layout: { padding: { top: 40 } }
  },
  plugins: [{
    id: 'barLabels',
    afterDatasetsDraw(chart) {
      const { ctx } = chart;
      // Total labels on top
      const totals = [6000, 10000, 11500];
      const labels = ['6,000만', '1억', '1.15억'];
      chart.data.datasets[1].data.forEach((val, i) => {
        const meta0 = chart.getDatasetMeta(0);
        const meta1 = chart.getDatasetMeta(1);
        const bar0 = meta0.data[i];
        const bar1 = meta1.data[i];
        const x = bar1.x;
        const y = bar1.y - 16;
        ctx.save();
        ctx.font = 'bold 22px Noto Sans KR';
        ctx.fillStyle = '#1A1A1A';
        ctx.textAlign = 'center';
        ctx.fillText(labels[i], x, y);
        ctx.restore();
      });

      // Segment labels inside bars
      const segLabels0 = ['3,500만', '5,000만', '5,500만'];
      const segLabels1 = ['2,500만', '5,000만', '6,000만'];
      chart.data.datasets[0].data.forEach((val, i) => {
        const meta = chart.getDatasetMeta(0);
        const bar = meta.data[i];
        ctx.save();
        ctx.font = '600 18px Noto Sans KR';
        ctx.fillStyle = 'rgba(255,255,255,0.9)';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(segLabels0[i], bar.x, bar.y + bar.height/2);
        ctx.restore();
      });
      chart.data.datasets[1].data.forEach((val, i) => {
        const meta = chart.getDatasetMeta(1);
        const bar = meta.data[i];
        ctx.save();
        ctx.font = '600 18px Noto Sans KR';
        ctx.fillStyle = 'rgba(255,255,255,0.9)';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(segLabels1[i], bar.x, bar.y + bar.height/2);
        ctx.restore();
      });
    }
  }]
});
</script>
</body>
</html>
