<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1600px; height: 900px; overflow: hidden;
    background: #FFFFFF;
    font-family: 'Noto Sans KR', sans-serif;
    display: flex; flex-direction: column;
    padding: 60px 120px 50px;
  }
  .title { font-size: 38px; font-weight: 700; color: #1A1A1A; margin-bottom: 6px; }
  .subtitle { font-size: 20px; color: #888; margin-bottom: 40px; }
  .chart-container { flex: 1; position: relative; }
</style>
</head>
<body>
<div class="title">시나리오별 3개월 누적 매출 예측</div>
<div class="subtitle">보수적 / 기본 / 낙관적 시나리오 비교 (억원)</div>
<div class="chart-container">
  <canvas id="scenario"></canvas>
</div>
<script>
const ctx = document.getElementById('scenario').getContext('2d');
new Chart(ctx, {
  type: 'bar',
  data: {
    labels: ['보수적', '기본', '낙관적'],
    datasets: [{
      data: [1.85, 2.75, 3.55],
      backgroundColor: ['#9CA3AF', '#EF7B00', '#22C55E'],
      borderRadius: 8,
      borderSkipped: false,
      barPercentage: 0.55
    }]
  },
  options: {
    indexAxis: 'y',
    animation: false,
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
      legend: { display: false },
      tooltip: { enabled: false },
      annotation: {
        annotations: {}
      }
    },
    scales: {
      x: {
        min: 0, max: 4.2,
        grid: { color: '#F0F0F0' },
        ticks: {
          font: { family: 'Noto Sans KR', size: 16 },
          color: '#888',
          callback: v => v + '억'
        },
        border: { display: false }
      },
      y: {
        grid: { display: false },
        ticks: {
          font: { family: 'Noto Sans KR', size: 24, weight: '600' },
          color: '#444'
        },
        border: { display: false }
      }
    },
    layout: { padding: { right: 160 } }
  },
  plugins: [{
    id: 'barValAndTarget',
    afterDatasetsDraw(chart) {
      const { ctx } = chart;
      const labels = ['1.85억', '2.75억', '3.55억'];
      const colors = ['#9CA3AF', '#EF7B00', '#22C55E'];

      chart.data.datasets[0].data.forEach((val, i) => {
        const meta = chart.getDatasetMeta(0);
        const bar = meta.data[i];
        const x = bar.x + 16;
        const y = bar.y;
        ctx.save();
        ctx.font = `bold 26px Noto Sans KR`;
        ctx.fillStyle = colors[i];
        ctx.textAlign = 'left';
        ctx.textBaseline = 'middle';
        ctx.fillText(labels[i], x, y);
        ctx.restore();
      });

      // Target line at x=3.0억
      const xScale = chart.scales.x;
      const xPos = xScale.getPixelForValue(3.0);
      const top = chart.chartArea.top;
      const bottom = chart.chartArea.bottom;

      ctx.save();
      ctx.setLineDash([10, 6]);
      ctx.strokeStyle = '#EF4444';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(xPos, top);
      ctx.lineTo(xPos, bottom);
      ctx.stroke();
      ctx.restore();

      // Target label
      ctx.save();
      ctx.font = 'bold 17px Noto Sans KR';
      ctx.fillStyle = '#EF4444';
      ctx.textAlign = 'center';
      ctx.fillText('목표 3억', xPos, top - 14);
      ctx.restore();
    }
  }]
});
</script>
</body>
</html>
