<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1600px; height: 900px; overflow: hidden;
    background: #FFFFFF;
    font-family: 'Noto Sans KR', sans-serif;
    display: flex; flex-direction: column;
    padding: 60px 80px 50px;
  }
  .title { font-size: 38px; font-weight: 700; color: #1A1A1A; margin-bottom: 6px; }
  .subtitle { font-size: 20px; color: #888; margin-bottom: 50px; }
  .kpi-grid {
    flex: 1;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 32px;
  }
  .kpi-card {
    background: #F9FAFB;
    border-radius: 20px;
    padding: 40px 36px 36px;
    display: flex; flex-direction: column;
    gap: 16px;
    position: relative;
    border: 2px solid #F0F0F0;
    transition: none;
  }
  .kpi-card.highlight {
    background: #1A1A1A;
    border-color: #EF7B00;
  }
  .kpi-icon {
    width: 52px; height: 52px;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 26px;
  }
  .kpi-label {
    font-size: 18px; font-weight: 600; color: #888;
    letter-spacing: 0.03em;
  }
  .kpi-card.highlight .kpi-label { color: #888; }
  .kpi-value {
    font-size: 56px; font-weight: 900; color: #1A1A1A;
    line-height: 1; letter-spacing: -0.02em;
  }
  .kpi-card.highlight .kpi-value { color: #EF7B00; }
  .kpi-unit {
    font-size: 26px; font-weight: 700;
  }
  .kpi-desc {
    font-size: 15px; color: #9CA3AF;
    line-height: 1.5;
  }
  .kpi-card.highlight .kpi-desc { color: #666; }
  .kpi-badge {
    display: inline-block;
    background: rgba(239,123,0,0.12);
    color: #EF7B00;
    font-size: 14px; font-weight: 700;
    padding: 4px 12px; border-radius: 20px;
    margin-top: auto;
  }
  .kpi-badge-green {
    background: rgba(34,197,94,0.12);
    color: #22C55E;
  }
  .kpi-badge-blue {
    background: rgba(59,130,246,0.12);
    color: #3B82F6;
  }
</style>
</head>
<body>
<div class="title">핵심 성과 지표 (KPI) 대시보드</div>
<div class="subtitle">3개월 캠페인 목표 지표</div>
<div class="kpi-grid">

  <!-- ROAS -->
  <div class="kpi-card highlight">
    <div class="kpi-icon" style="background:rgba(239,123,0,0.2);">📈</div>
    <div class="kpi-label">목표 ROAS</div>
    <div class="kpi-value">467<span class="kpi-unit">%</span></div>
    <div class="kpi-desc">BEP 292% 대비<br>+175%p 초과 달성</div>
    <span class="kpi-badge">광고비 대비 매출</span>
  </div>

  <!-- CVR -->
  <div class="kpi-card">
    <div class="kpi-icon" style="background:rgba(59,130,246,0.1);">🎯</div>
    <div class="kpi-label">전환율 (CVR)</div>
    <div class="kpi-value">5<span class="kpi-unit">→8<span style="font-size:30px;font-weight:600;">%</span></span></div>
    <div class="kpi-desc">현재 5% 기준에서<br>8%까지 개선 목표</div>
    <span class="kpi-badge kpi-badge-blue">+3%p 개선</span>
  </div>

  <!-- 리뷰 -->
  <div class="kpi-card">
    <div class="kpi-icon" style="background:rgba(34,197,94,0.1);">⭐</div>
    <div class="kpi-label">리뷰 누적</div>
    <div class="kpi-value">300<span class="kpi-unit">개+</span></div>
    <div class="kpi-desc">3개월간 신규 리뷰<br>월 100개 목표</div>
    <span class="kpi-badge kpi-badge-green">4.5점 이상 유지</span>
  </div>

  <!-- 매출 -->
  <div class="kpi-card">
    <div class="kpi-icon" style="background:rgba(239,123,0,0.1);">💰</div>
    <div class="kpi-label">누적 매출 목표</div>
    <div class="kpi-value">2.75<span class="kpi-unit">억</span></div>
    <div class="kpi-desc">4~6월 기본 시나리오<br>월평균 9,200만원</div>
    <span class="kpi-badge">기본 시나리오</span>
  </div>

</div>
</body>
</html>
