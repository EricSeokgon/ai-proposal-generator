<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1600px; height: 900px; overflow: hidden;
    background: #FFFFFF;
    font-family: 'Noto Sans KR', sans-serif;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }
  .title {
    font-size: 38px; font-weight: 700; color: #1A1A1A;
    margin-bottom: 6px; text-align: center;
  }
  .subtitle {
    font-size: 20px; color: #888;
    margin-bottom: 40px; text-align: center;
  }
  .content {
    display: flex; align-items: center; gap: 100px;
  }
  .chart-container {
    position: relative; width: 500px; height: 500px;
  }
  .center-label {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    text-align: center; pointer-events: none;
  }
  .center-title {
    font-size: 20px; font-weight: 600; color: #888;
    margin-bottom: 6px;
  }
  .center-value {
    font-size: 42px; font-weight: 900; color: #1A1A1A;
    line-height: 1;
  }
  .center-sub {
    font-size: 18px; color: #888;
    margin-top: 4px;
  }
  /* Legend */
  .legend {
    display: flex; flex-direction: column; gap: 24px;
  }
  .legend-item {
    display: flex; align-items: center; gap: 16px;
  }
  .legend-dot {
    width: 20px; height: 20px; border-radius: 4px; flex-shrink: 0;
  }
  .legend-name {
    font-size: 22px; font-weight: 600; color: #444; width: 140px;
  }
  .legend-pct {
    font-size: 26px; font-weight: 700;
    width: 60px;
  }
  .legend-amount {
    font-size: 18px; color: #888;
  }
</style>
</head>
<body>
<div class="title">채널별 광고 예산 배분</div>
<div class="subtitle">3개월 총 예산 3,000만원 기준</div>
<div class="content">
  <div class="chart-container">
    <canvas id="donut"></canvas>
    <div class="center-label">
      <div class="center-title">총 예산</div>
      <div class="center-value">3,000<span style="font-size:26px;">만원</span></div>
      <div class="center-sub">3개월 누적</div>
    </div>
  </div>
  <div class="legend">
    <div class="legend-item">
      <div class="legend-dot" style="background:#EF7B00;"></div>
      <div class="legend-name">검색광고</div>
      <div class="legend-pct" style="color:#EF7B00;">55%</div>
      <div class="legend-amount">1,650만원</div>
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:#3B82F6;"></div>
      <div class="legend-name">디스플레이</div>
      <div class="legend-pct" style="color:#3B82F6;">25%</div>
      <div class="legend-amount">750만원</div>
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:#22C55E;"></div>
      <div class="legend-name">리뷰</div>
      <div class="legend-pct" style="color:#22C55E;">10%</div>
      <div class="legend-amount">300만원</div>
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:#A855F7;"></div>
      <div class="legend-name">콘텐츠제작</div>
      <div class="legend-pct" style="color:#A855F7;">10%</div>
      <div class="legend-amount">300만원</div>
    </div>
  </div>
</div>
<script>
const ctx = document.getElementById('donut').getContext('2d');
new Chart(ctx, {
  type: 'doughnut',
  data: {
    labels: ['검색광고', '디스플레이', '리뷰', '콘텐츠제작'],
    datasets: [{
      data: [55, 25, 10, 10],
      backgroundColor: ['#EF7B00', '#3B82F6', '#22C55E', '#A855F7'],
      borderWidth: 0,
      hoverOffset: 8
    }]
  },
  options: {
    animation: false,
    responsive: true,
    maintainAspectRatio: true,
    cutout: '65%',
    plugins: {
      legend: { display: false },
      tooltip: { enabled: false }
    }
  }
});
</script>
</body>
</html>
