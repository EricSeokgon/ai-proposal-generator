<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1600px; height: 900px; overflow: hidden;
    background: #FFFFFF;
    font-family: 'Noto Sans KR', sans-serif;
    display: flex; flex-direction: column;
    padding: 60px 120px 40px;
  }
  .header {
    display: flex; justify-content: space-between; align-items: flex-end;
    margin-bottom: 40px;
  }
  .title { font-size: 38px; font-weight: 700; color: #1A1A1A; }
  .subtitle { font-size: 20px; color: #888; margin-top: 6px; }
  .legend { display: flex; gap: 28px; align-items: center; }
  .leg-item { display: flex; align-items: center; gap: 10px; }
  .leg-dot { width: 18px; height: 14px; border-radius: 3px; }
  .leg-text { font-size: 17px; font-weight: 600; color: #555; }
  .chart-container { flex: 1; position: relative; }
</style>
</head>
<body>
<div class="header">
  <div>
    <div class="title">월별 예산 집행 계획</div>
    <div class="subtitle">채널별 예산 배분 (만원)</div>
  </div>
  <div class="legend">
    <div class="leg-item"><div class="leg-dot" style="background:#EF7B00;"></div><div class="leg-text">검색광고</div></div>
    <div class="leg-item"><div class="leg-dot" style="background:#3B82F6;"></div><div class="leg-text">디스플레이</div></div>
    <div class="leg-item"><div class="leg-dot" style="background:#22C55E;"></div><div class="leg-text">리뷰</div></div>
    <div class="leg-item"><div class="leg-dot" style="background:#A855F7;"></div><div class="leg-text">콘텐츠제작</div></div>
  </div>
</div>
<div class="chart-container">
  <canvas id="budgetBar"></canvas>
</div>
<script>
const ctx = document.getElementById('budgetBar').getContext('2d');
new Chart(ctx, {
  type: 'bar',
  data: {
    labels: ['4월', '5월', '6월'],
    datasets: [
      {
        label: '검색광고',
        data: [550, 550, 550],
        backgroundColor: '#EF7B00',
        borderRadius: { topLeft: 0, topRight: 0, bottomLeft: 6, bottomRight: 6 },
        borderSkipped: false,
      },
      {
        label: '디스플레이',
        data: [250, 250, 250],
        backgroundColor: '#3B82F6',
        borderRadius: 0,
        borderSkipped: false,
      },
      {
        label: '리뷰',
        data: [100, 100, 100],
        backgroundColor: '#22C55E',
        borderRadius: 0,
        borderSkipped: false,
      },
      {
        label: '콘텐츠제작',
        data: [100, 100, 100],
        backgroundColor: '#A855F7',
        borderRadius: { topLeft: 6, topRight: 6, bottomLeft: 0, bottomRight: 0 },
        borderSkipped: false,
      }
    ]
  },
  options: {
    animation: false,
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
      legend: { display: false },
      tooltip: { enabled: false }
    },
    scales: {
      x: {
        stacked: true,
        grid: { display: false },
        ticks: {
          font: { family: 'Noto Sans KR', size: 24, weight: '600' },
          color: '#444'
        },
        border: { display: false }
      },
      y: {
        stacked: true,
        min: 0, max: 1400,
        grid: { color: '#F0F0F0' },
        ticks: {
          font: { family: 'Noto Sans KR', size: 16 },
          color: '#888',
          callback: v => v === 0 ? '' : v + '만'
        },
        border: { display: false }
      }
    },
    layout: { padding: { top: 50 } }
  },
  plugins: [{
    id: 'totalLabels',
    afterDatasetsDraw(chart) {
      const { ctx } = chart;
      const numMonths = 3;
      for (let i = 0; i < numMonths; i++) {
        const lastDs = chart.getDatasetMeta(3);
        const bar = lastDs.data[i];
        ctx.save();
        ctx.font = 'bold 22px Noto Sans KR';
        ctx.fillStyle = '#1A1A1A';
        ctx.textAlign = 'center';
        ctx.fillText('1,000만원', bar.x, bar.y - 14);
        ctx.restore();
      }
    }
  }]
});
</script>
</body>
</html>
